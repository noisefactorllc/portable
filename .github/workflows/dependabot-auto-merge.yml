name: Dependabot auto-merge

# Fires AFTER any CI workflow completes. Auto-merges Dependabot PRs if:
#   1. All PR-triggered CI runs for the head SHA passed.
#   2. The bump is not a major version change.
#
# Policy: patch AND minor bumps ship automatically after the dependabot
# cooldown (7d default / 14d for majors). Only actual major version bumps
# need a human to review and merge.
#
# Title formats Dependabot emits:
#   - "deps: bump the npm-patches group with 5 updates"
#   - "deps: bump the npm-minor-major group with 2 updates"
#   - "deps: bump express from 7.5.1 to 8.5.1 in the npm-minor-major group"
#   - "deps: bump playwright from 1.57.0 to 1.60.0"
#   - "deps(pip): update fastapi requirement from ==0.137.* to ==0.138.*"
#   - "deps(pip): update pytest requirement from >=9.1.0 to >=9.1.1"
#   - "deps(pip): bump sphinxcontrib-programoutput from 0.19 to 0.20"

on:
  workflow_run:
    workflows:
      - ci
      - JavaScript
      - Python
      - Test
      - Build
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Mint EHSRE app token
        id: app-token
        # EHSRE_APP_PRIVATE_KEY is an org secret with visibility=private, so it
        # is absent in public repos. continue-on-error lets us fall back to
        # github.token (which has write access and suffices for merge + approve).
        continue-on-error: true
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: 2959521
          private-key: ${{ secrets.EHSRE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-actions: read

      - name: Evaluate PR
        id: eval
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          PR_DATA=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" --jq '.[0] // empty')
          if [ -z "$PR_DATA" ]; then echo "No PR for $HEAD_SHA"; exit 0; fi

          PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
          PR_USER=$(echo "$PR_DATA" | jq -r '.user.login')
          if [ "$PR_USER" != "dependabot[bot]" ]; then
            echo "PR #$PR_NUM by $PR_USER — not Dependabot, skipping"
            exit 0
          fi

          # Verify every CI run for this SHA passed. The EHSRE app has no
          # `checks` permission, so read Actions workflow runs (covered by
          # `actions`) instead of check-runs. Consider only PR-triggered CI
          # runs, which excludes this workflow_run-triggered auto-merge run.
          RUNS=$(gh api "repos/$REPO/actions/runs?head_sha=$HEAD_SHA&per_page=100" --jq '.workflow_runs')
          PENDING=$(echo "$RUNS" | jq '[.[] | select(.event=="pull_request" and .status != "completed")] | length')
          FAILED=$(echo "$RUNS" | jq '[.[] | select(.event=="pull_request" and (.conclusion=="failure" or .conclusion=="cancelled" or .conclusion=="timed_out"))] | length')

          if [ "$PENDING" -gt 0 ]; then
            echo "$PENDING check(s) pending — wait for next workflow_run"
            exit 0
          fi
          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED check(s) failed — NOT auto-merging PR #$PR_NUM"
            exit 0
          fi

          # ------------------------------------------------------------------
          # Classify the bump. Policy: patch AND minor bumps ship automatically;
          # only major version bumps need a human to review.
          # ------------------------------------------------------------------
          TITLE=$(echo "$PR_DATA" | jq -r '.title // ""')
          BODY=$(echo "$PR_DATA"  | jq -r '.body  // ""')
          REASON=""
          SKIP_REASON=""

          # 1. Grouped patch PRs ("in the X-patches group" / "bump the X-patches group")
          if echo "$TITLE" | grep -qiE '(the |in the )[a-z0-9-]+-patches group'; then
            REASON="grouped patches"

          # 2. Grouped minor / minor-major PRs: auto-merge only when every
          #    bump in the group stays on the same major version.
          #    Dependabot body lines: "Updates X from 1.2.3 to 1.3.0"
          elif echo "$TITLE" | grep -qiE '(the |in the )[a-z0-9-]+-minor(-major)? group'; then
            HAS_MAJOR=$(echo "$BODY" \
              | grep -oE 'from [0-9][0-9.]+ to [0-9][0-9.]+' \
              | sed -E 's/from ([0-9]+)[^ ]* to ([0-9]+).*/\1 \2/' \
              | awk '$1 != $2 {print "MAJOR"; exit}')
            if [ -n "$HAS_MAJOR" ]; then
              SKIP_REASON="grouped PR contains a major version bump"
            else
              REASON="grouped minors (no major bumps)"
            fi

          else
            # 3. Single-package PR: extract the major version number from the
            #    "from … to …" pair in the title. Handles full semver (1.2.3),
            #    two-part (0.19), pip pinned (==1.2.*), and pip range (>=1.2.0).
            FROM_MAJ=$(echo " $TITLE " | grep -oE ' from [^0-9]*[0-9]+' | grep -oE '[0-9]+$' | head -1)
            TO_MAJ=$(echo " $TITLE "   | grep -oE ' to [^0-9]*[0-9]+'   | grep -oE '[0-9]+$' | head -1)

            if [ -z "$FROM_MAJ" ] || [ -z "$TO_MAJ" ]; then
              echo "Cannot classify PR title — leaving open for review: $TITLE"
              exit 0
            fi

            if [ "$FROM_MAJ" = "$TO_MAJ" ]; then
              REASON="single non-major (major stays at $FROM_MAJ)"
            else
              SKIP_REASON="single major bump ($FROM_MAJ → $TO_MAJ)"
            fi
          fi

          case "$REASON" in
            "")
              echo "PR #$PR_NUM: $SKIP_REASON — NOT auto-merging"
              gh pr comment "$PR_NUM" -R "$REPO" \
                --body "Auto-merge skipped: $SKIP_REASON. Patch and minor bumps auto-merge after CI passes; major bumps need a human to review and merge." || true
              ;;
            *)
              echo "Non-major ($REASON) and CI green — merging PR #$PR_NUM"
              echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Approve
        if: steps.eval.outputs.pr_num != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: gh pr review --approve "${{ steps.eval.outputs.pr_num }}" -R "${{ github.repository }}" || true

      - name: Merge
        if: steps.eval.outputs.pr_num != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: gh pr merge --squash --delete-branch "${{ steps.eval.outputs.pr_num }}" -R "${{ github.repository }}"
