name: Dependabot auto-merge

# Fires AFTER any CI workflow completes. Auto-merges Dependabot PRs ONLY if:
#   1. All check_runs for the head SHA passed (no required-status-checks
#      branch protection on these repos, so gh pr merge --auto can't gate
#      on its own).
#   2. The PR is patch-level only. Classification:
#      - Grouped PRs use the group name in the title:
#          *"-patches group"*       → auto-merge
#          *"-minor-major group"*   → human review
#      - Single-package PRs: parse version pair from title.
#
# Title formats Dependabot emits (after our dependabot.yml split):
#   - "deps(npm): bump the npm-patches group with 5 updates"
#   - "deps(npm): bump the npm-minor-major group with 2 updates"
#   - "deps: bump playwright from 1.57.0 to 1.60.0"
#   - "deps: bump express-rate-limit from 7.5.1 to 8.5.1 in the npm-patches group"

on:
  workflow_run:
    workflows:
      - ci
      - JavaScript
      - Python
      - Test
      - Build
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Evaluate PR
        id: eval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          PR_DATA=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" --jq '.[0] // empty')
          if [ -z "$PR_DATA" ]; then echo "No PR for $HEAD_SHA"; exit 0; fi

          PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
          PR_USER=$(echo "$PR_DATA" | jq -r '.user.login')
          if [ "$PR_USER" != "dependabot[bot]" ]; then
            echo "PR #$PR_NUM by $PR_USER — not Dependabot, skipping"
            exit 0
          fi

          # Verify every check_run for this SHA passed
          CHECKS=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs?per_page=100" --jq '.check_runs')
          PENDING=$(echo "$CHECKS" | jq '[.[] | select(.status != "completed")] | length')
          FAILED=$(echo "$CHECKS" | jq '[.[] | select(.conclusion=="failure" or .conclusion=="cancelled" or .conclusion=="timed_out")] | length')

          if [ "$PENDING" -gt 0 ]; then
            echo "$PENDING check(s) pending — wait for next workflow_run"
            exit 0
          fi
          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED check(s) failed — NOT auto-merging PR #$PR_NUM"
            exit 0
          fi

          # Classify by title: grouped vs single-package, patch vs non-patch
          TITLE=$(echo "$PR_DATA" | jq -r '.title // ""')
          REASON=""

          if echo "$TITLE" | grep -qE 'bump the [a-z-]+-patches group'; then
            REASON="grouped patches"
          elif echo "$TITLE" | grep -qE 'bump the [a-z-]+-minor-major group'; then
            REASON="non-patch grouped bump (minor/major group)"
          else
            # Single-package — extract version pair from title
            VER_LINE=$(echo "$TITLE" | grep -oE 'from [0-9]+\.[0-9]+\.[0-9]+ to [0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -z "$VER_LINE" ]; then
              echo "Cannot classify PR title — leaving open for review: $TITLE"
              exit 0
            fi
            from=$(echo "$VER_LINE" | sed -E 's/from ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
            to=$(echo "$VER_LINE"   | sed -E 's/.*to ([0-9]+\.[0-9]+\.[0-9]+)/\1/')
            fm=$(echo "$from" | cut -d. -f1); tm=$(echo "$to" | cut -d. -f1)
            fn=$(echo "$from" | cut -d. -f2); tn=$(echo "$to" | cut -d. -f2)
            if [ "$fm" = "$tm" ] && [ "$fn" = "$tn" ]; then
              REASON="single patch $from → $to"
            else
              REASON="single non-patch $from → $to"
            fi
          fi

          case "$REASON" in
            "grouped patches"|"single patch"*)
              echo "Patch-only ($REASON) and CI green — merging PR #$PR_NUM"
              echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "PR #$PR_NUM is $REASON — NOT auto-merging"
              gh pr comment "$PR_NUM" -R "$REPO" --body "Auto-merge skipped: $REASON. Patch-level bumps auto-merge after CI passes; minor and major bumps need a human to review and merge." || true
              ;;
          esac

      - name: Approve
        if: steps.eval.outputs.pr_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "${{ steps.eval.outputs.pr_num }}" -R "${{ github.repository }}" || true

      - name: Merge
        if: steps.eval.outputs.pr_num != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --delete-branch "${{ steps.eval.outputs.pr_num }}" -R "${{ github.repository }}"
