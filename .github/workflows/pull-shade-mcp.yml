# Pull latest shade-mcp release when triggered
name: Pull shade-mcp

on:
  repository_dispatch:
    types: [shade-mcp-updated]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to download (e.g. v0.1.0)'
        required: true

jobs:
  pull-shade-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.NOISEDECK_APP_ID }}
          private-key: ${{ secrets.NOISEDECK_APP_PRIVATE_KEY }}
          owner: noisefactorllc

      - name: Checkout portable
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Run pull-shade-mcp
        env:
          SHADE_MCP_TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python3 pull-shade-mcp

      - name: Check for changes
        id: changes
        env:
          SHADE_MCP_TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        env:
          SHADE_MCP_TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "pull upstream shade-mcp dist

          shade-mcp release: ${SHADE_MCP_TAG}
          Source: https://github.com/noisedeck/shade-mcp/releases/tag/${SHADE_MCP_TAG}"
          git push
